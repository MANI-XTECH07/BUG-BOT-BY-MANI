<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>𝖵𝖺𝗆𝗉𝗂𝗋𝖾 𝖪𝗂𝗅𝗅𝖾𝗋 — Bot Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Share+Tech+Mono&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --blood:   #c0001a;
    --crimson: #8b0000;
    --dark:    #0a0006;
    --panel:   #110010;
    --border:  #3a0025;
    --glow:    #ff003c;
    --text:    #e8c8d0;
    --mono:    'Share Tech Mono', monospace;
    --title:   'Cinzel Decorative', cursive;
    --body:    'Rajdhani', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: var(--body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ─── Animated blood-drip background ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -20%, #4a000822 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 10% 90%,  #3a000044 0%, transparent 70%),
      radial-gradient(ellipse 30% 30% at 90% 20%,  #50000033 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .grid-overlay {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(140,0,30,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(140,0,30,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Drip lines */
  .drip { position: fixed; top: 0; width: 2px; background: linear-gradient(#8b000055, transparent); pointer-events: none; z-index: 0; animation: drip linear infinite; }
  .drip:nth-child(1)  { left: 8%;   height: 120px; animation-duration: 7s;  animation-delay: 0s; }
  .drip:nth-child(2)  { left: 22%;  height: 80px;  animation-duration: 9s;  animation-delay: 2s; }
  .drip:nth-child(3)  { left: 38%;  height: 160px; animation-duration: 6s;  animation-delay: 1s; }
  .drip:nth-child(4)  { left: 55%;  height: 100px; animation-duration: 11s; animation-delay: 3s; }
  .drip:nth-child(5)  { left: 70%;  height: 90px;  animation-duration: 8s;  animation-delay: 0.5s; }
  .drip:nth-child(6)  { left: 85%;  height: 140px; animation-duration: 10s; animation-delay: 4s; }
  @keyframes drip { 0%,100%{opacity:.15} 50%{opacity:.35} }

  /* ─── Main card ─── */
  .card {
    position: relative;
    z-index: 1;
    width: min(480px, 94vw);
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid var(--blood);
    padding: 40px 36px 36px;
    box-shadow:
      0 0 60px #8b000022,
      0 0 120px #8b000011,
      inset 0 1px 0 #3a0025;
    animation: fadeIn .8s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* corner accents */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    border-color: var(--blood);
    border-style: solid;
  }
  .card::before { top: -1px; left: -1px;  border-width: 2px 0 0 2px; }
  .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  /* ─── Header ─── */
  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 6px;
  }

  .bat-icon {
    font-size: 28px;
    line-height: 1;
    filter: drop-shadow(0 0 6px var(--glow));
    animation: flicker 4s ease-in-out infinite;
  }

  @keyframes flicker { 0%,100%{opacity:1} 45%{opacity:.7} 47%{opacity:1} 80%{opacity:.85} }

  h1 {
    font-family: var(--title);
    font-size: clamp(13px, 3vw, 17px);
    letter-spacing: .05em;
    color: #fff;
    text-shadow: 0 0 20px var(--glow), 0 0 40px #ff003c55;
    line-height: 1.2;
  }

  .version {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--blood);
    letter-spacing: .15em;
    margin-bottom: 28px;
    padding-left: 2px;
  }

  hr { border: none; border-top: 1px solid var(--border); margin: 0 0 28px; }

  /* ─── Form ─── */
  label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .2em;
    color: #aa6677;
    margin-bottom: 8px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  input[type="text"] {
    flex: 1;
    background: #0d000d;
    border: 1px solid var(--border);
    border-radius: 0;
    color: var(--text);
    font-family: var(--mono);
    font-size: 15px;
    padding: 11px 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    letter-spacing: .05em;
  }

  input[type="text"]:focus {
    border-color: var(--blood);
    box-shadow: 0 0 0 2px #8b000033, 0 0 16px #8b000044;
  }

  input[type="text"]::placeholder { color: #4a2030; }

  button {
    background: var(--blood);
    color: #fff;
    border: none;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: .15em;
    padding: 11px 20px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background .2s, box-shadow .2s;
    white-space: nowrap;
    text-transform: uppercase;
  }

  button:hover:not(:disabled) {
    background: #e0001e;
    box-shadow: 0 0 20px #c0001a88;
  }

  button:disabled {
    background: #3a0020;
    color: #6a3040;
    cursor: not-allowed;
  }

  button .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,.15);
    transform: scale(0);
    animation: ripple .5s linear;
    pointer-events: none;
  }
  @keyframes ripple { to { transform: scale(4); opacity: 0; } }

  /* ─── Status / Result ─── */
  .status-box {
    background: #0d000d;
    border: 1px solid var(--border);
    padding: 16px 18px;
    font-family: var(--mono);
    font-size: 13px;
    min-height: 58px;
    line-height: 1.7;
    position: relative;
    display: none;
    animation: slideIn .3s ease both;
  }

  @keyframes slideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  .status-box.show { display: block; }

  .status-box.loading { color: #aa8890; }
  .status-box.error   { color: #ff4060; border-color: #5a0020; }
  .status-box.success { color: #00e87a; border-color: #004a25; }
  .status-box.warning { color: #ffcc44; border-color: #4a3800; }

  .code-display {
    display: none;
    margin-top: 20px;
    text-align: center;
    animation: slideIn .4s ease both;
  }

  .code-display.show { display: block; }

  .code-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .2em;
    color: #aa6677;
    margin-bottom: 12px;
  }

  .code-value {
    font-family: var(--title);
    font-size: clamp(26px, 8vw, 36px);
    letter-spacing: .25em;
    color: #fff;
    text-shadow:
      0 0 20px var(--glow),
      0 0 40px #ff003c88,
      0 0 70px #ff003c44;
    animation: pulse 2s ease-in-out infinite;
    cursor: pointer;
    user-select: all;
    border: 1px solid var(--blood);
    padding: 14px 24px;
    display: inline-block;
    position: relative;
  }

  .code-value::after {
    content: 'CLICK TO COPY';
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: .2em;
    color: #6a3040;
  }

  @keyframes pulse { 0%,100%{text-shadow:0 0 20px var(--glow),0 0 40px #ff003c88} 50%{text-shadow:0 0 30px var(--glow),0 0 60px #ff003caa,0 0 100px #ff003c55} }

  .copy-msg {
    font-family: var(--mono);
    font-size: 11px;
    color: #00e87a;
    margin-top: 28px;
    height: 16px;
    text-align: center;
    letter-spacing: .1em;
    opacity: 0;
    transition: opacity .3s;
  }
  .copy-msg.show { opacity: 1; }

  /* ─── Footer ─── */
  .footer {
    margin-top: 28px;
    font-family: var(--mono);
    font-size: 10px;
    color: #3a1a25;
    letter-spacing: .15em;
    text-align: center;
  }

  /* ─── Spinner ─── */
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid #4a2030;
    border-top-color: var(--blood);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── Ping indicator ─── */
  .ping-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #3a1a25;
    margin-right: 7px;
    vertical-align: middle;
    transition: background .3s, box-shadow .3s;
  }
  .ping-dot.alive { background: #00e87a; box-shadow: 0 0 6px #00e87a88; }
  .ping-dot.dead  { background: #ff4060; box-shadow: 0 0 6px #ff406088; }

  .server-status {
    font-family: var(--mono);
    font-size: 10px;
    color: #6a3040;
    margin-bottom: 20px;
    letter-spacing: .1em;
  }
</style>
</head>
<body>

<div class="grid-overlay"></div>
<div class="drip"></div>
<div class="drip"></div>
<div class="drip"></div>
<div class="drip"></div>
<div class="drip"></div>
<div class="drip"></div>

<div class="card">

  <div class="logo-row">
    <span class="bat-icon">🦇</span>
    <h1>Vampire Killer</h1>
  </div>
  <div class="version">V1 &nbsp;·&nbsp; PAIR PANEL</div>

  <div class="server-status">
    <span class="ping-dot" id="pingDot"></span>
    <span id="pingText">checking server...</span>
  </div>

  <hr/>

  <label>WHATSAPP NUMBER</label>
  <div class="input-row">
    <input
      type="text"
      id="numInput"
      placeholder="9779807044421"
      maxlength="20"
      autocomplete="off"
      inputmode="numeric"
    />
    <button id="pairBtn" onclick="getPairCode()">GET CODE</button>
  </div>

  <div class="status-box" id="statusBox"></div>

  <div class="code-display" id="codeDisplay">
    <div class="code-label">── PAIRING CODE ──</div>
    <div class="code-value" id="codeValue" onclick="copyCode()">────</div>
    <div class="copy-msg" id="copyMsg">✓ COPIED</div>
  </div>

  <div class="footer">© 𝖵𝖺𝗆𝗉𝗂𝗋𝖾 𝖪𝗂𝗅𝗅𝖾𝗋 &nbsp;·&nbsp; OWNER: MANI-XTECH</div>
</div>

<script>
  // ── CONFIG ── Change this to your server URL ──────────────────────────────
  const SERVER = window.location.origin; 
  // If running separately, set like: const SERVER = "https://your-bot-server.com";
  // ─────────────────────────────────────────────────────────────────────────

  const pingDot  = document.getElementById('pingDot');
  const pingText = document.getElementById('pingText');

  async function pingServer() {
    try {
      const r = await fetch(`${SERVER}/ping`, { signal: AbortSignal.timeout(5000) });
      const d = await r.json();
      pingDot.className  = 'ping-dot alive';
      pingText.textContent = `server online · ${d.activesession ?? 0} active session(s)`;
    } catch {
      pingDot.className  = 'ping-dot dead';
      pingText.textContent = 'server offline or unreachable';
    }
  }

  pingServer();
  setInterval(pingServer, 30000);

  function setStatus(msg, type) {
    const box = document.getElementById('statusBox');
    box.innerHTML  = msg;
    box.className  = `status-box show ${type}`;
  }

  function hideStatus() {
    document.getElementById('statusBox').className = 'status-box';
  }

  function showCode(code) {
    document.getElementById('codeValue').textContent = code;
    document.getElementById('codeDisplay').className = 'code-display show';
  }

  function hideCode() {
    document.getElementById('codeDisplay').className = 'code-display';
  }

  function copyCode() {
    const code = document.getElementById('codeValue').textContent;
    if (!code || code === '────') return;
    navigator.clipboard.writeText(code).then(() => {
      const msg = document.getElementById('copyMsg');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 2000);
    });
  }

  function rippleBtn(btn, e) {
    const r   = document.createElement('span');
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px`;
    r.className = 'ripple';
    btn.appendChild(r);
    setTimeout(() => r.remove(), 600);
  }

  document.getElementById('pairBtn').addEventListener('click', function(e) {
    rippleBtn(this, e);
  });

  document.getElementById('numInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') getPairCode();
  });

  async function getPairCode() {
    const btn   = document.getElementById('pairBtn');
    const input = document.getElementById('numInput');
    const num   = input.value.replace(/\D/g, '').trim();

    if (!num || num.length < 7) {
      setStatus('⚠ Enter a valid number with country code (e.g. 9779807044421)', 'error');
      return;
    }

    hideCode();
    btn.disabled = true;
    setStatus('<span class="spinner"></span>Connecting to server...', 'loading');

    try {
      const res  = await fetch(`${SERVER}/?number=${encodeURIComponent(num)}`, {
        signal: AbortSignal.timeout(30000)
      });
      const data = await res.json();

      if (!res.ok) {
        setStatus(`❌ Error: ${data?.error || res.statusText}`, 'error');
        return;
      }

      if (data.code) {
        setStatus(`✅ Pairing code generated for <b>${num}</b>`, 'success');
        showCode(data.code);
      } else if (data.status === 'already_paired' || data.status === 'already_connected') {
        setStatus(`⚡ <b>${num}</b> is already connected / session restored.`, 'warning');
      } else {
        setStatus(`ℹ ${JSON.stringify(data)}`, 'warning');
      }
    } catch (err) {
      if (err.name === 'TimeoutError') {
        setStatus('⏱ Request timed out. Server may be busy.', 'error');
      } else {
        setStatus(`❌ Could not reach server.<br><small style="color:#6a3040">${err.message}</small>`, 'error');
      }
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
